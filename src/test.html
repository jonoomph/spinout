<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Road Spline</title>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
      font-family: sans-serif;
    }
    #canvas {
      border: 2px solid #333;
      cursor: crosshair;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.9);
      padding: 6px 10px;
      border-radius: 4px;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <div id="info">
    • Click to add a point<br>
    • Click an existing point to delete<br>
    • Spline follows the order you clicked (bottom→top only if that’s your order)
  </div>
  <canvas id="canvas" width="600" height="600"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const pts    = [];
    const R      = 8;    // hit-radius for delete/add
    const SAMPLES = 20;  // Catmull–Rom subdivisions per segment

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // border
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.strokeRect(0, 0, canvas.width, canvas.height);

      // points
      for (let p of pts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, R, 0, Math.PI*2);
        ctx.fillStyle = 'crimson';
        ctx.fill();
      }

      // spline
      if (pts.length >= 2) {
        // use click sequence order
        const curve = catmullRomChain(pts, SAMPLES);

        ctx.beginPath();
        ctx.strokeStyle = 'darkblue';
        ctx.lineWidth = 2;
        ctx.moveTo(curve[0].x, curve[0].y);
        for (let pt of curve) ctx.lineTo(pt.x, pt.y);
        ctx.stroke();
      }
    }

    // Build a Catmull–Rom spline through `points` in given order
    function catmullRomChain(points, samples) {
      const out = [];
      for (let i = 0; i < points.length - 1; i++) {
        const p0 = points[i-1]     || points[i];
        const p1 = points[i];
        const p2 = points[i+1];
        const p3 = points[i+2]     || points[i+1];

        for (let j = 0; j < samples; j++) {
          const t  = j / samples;
          const t2 = t*t, t3 = t2*t;

          const x = 0.5 * (
            ( 2*p1.x ) +
            (-p0.x + p2.x) * t +
            ( 2*p0.x - 5*p1.x + 4*p2.x - p3.x) * t2 +
            (-p0.x + 3*p1.x - 3*p2.x + p3.x) * t3
          );
          const y = 0.5 * (
            ( 2*p1.y ) +
            (-p0.y + p2.y) * t +
            ( 2*p0.y - 5*p1.y + 4*p2.y - p3.y) * t2 +
            (-p0.y + 3*p1.y - 3*p2.y + p3.y) * t3
          );
          out.push({x, y});
        }
      }
      // include final endpoint
      out.push({ ...points[points.length-1] });
      return out;
    }

    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      // if clicked near an existing point → delete
      for (let i = 0; i < pts.length; i++) {
        const dx = pts[i].x - x;
        const dy = pts[i].y - y;
        if (dx*dx + dy*dy < R*R) {
          pts.splice(i, 1);
          draw();
          return;
        }
      }

      // otherwise add new point at end of sequence
      pts.push({x, y});
      draw();
    });

    // initial draw
    draw();
  </script>
</body>
</html>
